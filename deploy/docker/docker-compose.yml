services:
  postgres:
    container_name: ${POSTGRES_CONTAINER_NAME:-dogbot-postgres}
    image: ${POSTGRES_IMAGE:-postgres:15}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dogbot}
      POSTGRES_USER: ${POSTGRES_ADMIN_USER:-dogbot_admin}
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD:-change-me}
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - "${POSTGRES_DATA_DIR:-/srv/dogbot/runtime/agent-state/postgres}:/var/lib/postgresql/data"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_ADMIN_USER:-dogbot_admin} -d ${POSTGRES_DB:-dogbot}"]
      interval: 30s
      timeout: 5s
      retries: 12

  claude-runner:
    container_name: ${CLAUDE_CONTAINER_NAME:-claude-runner} # default name expected by agent-runner
    image: ${CLAUDE_IMAGE_NAME:-dogbot/claude-runner:local}
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
      args:
        CLAUDE_CODE_VERSION: ${CLAUDE_CODE_VERSION:-latest}
    restart: unless-stopped
    stdin_open: false
    tty: false
    cpus: "4.0"
    mem_limit: 4g
    memswap_limit: 4g
    pids_limit: 256
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777
      - /run:size=64m
    environment:
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-http://127.0.0.1:${BIFROST_PORT:-8080}/anthropic}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-dummy}
      ANTHROPIC_DEFAULT_SONNET_MODEL: ${BIFROST_MODEL:-primary/model-id}
      ANTHROPIC_DEFAULT_HAIKU_MODEL: ${BIFROST_MODEL:-primary/model-id}
      ANTHROPIC_DEFAULT_OPUS_MODEL: ${BIFROST_MODEL:-primary/model-id}
      CLAUDE_CONFIG_DIR: /state/claude
      CLAUDE_CODE_ADDITIONAL_DIRECTORIES_CLAUDE_MD: 1
      CLAUDE_CODE_DISABLE_AUTO_MEMORY: 1
      BIFROST_PORT: ${BIFROST_PORT:-8080}
      BIFROST_PROVIDER_NAME: ${BIFROST_PROVIDER_NAME:-primary}
      BIFROST_MODEL: ${BIFROST_MODEL:-primary/model-id}
      BIFROST_UPSTREAM_PROVIDER_TYPE: ${BIFROST_UPSTREAM_PROVIDER_TYPE:-openai}
      BIFROST_UPSTREAM_BASE_URL: ${BIFROST_UPSTREAM_BASE_URL:-https://example.com}
      BIFROST_UPSTREAM_API_KEY: ${BIFROST_UPSTREAM_API_KEY:-replace-me}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      ALL_PROXY: ${ALL_PROXY:-}
      NO_PROXY: ${NO_PROXY:-}
      http_proxy: ${HTTP_PROXY:-}
      https_proxy: ${HTTPS_PROXY:-}
      all_proxy: ${ALL_PROXY:-}
      no_proxy: ${NO_PROXY:-}
    volumes:
      - "${AGENT_WORKSPACE_DIR:-/srv/agent-workdir}:/workspace"
      - "${AGENT_STATE_DIR:-/srv/agent-state}:/state"
    working_dir: /workspace
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    command: ["/usr/local/bin/entrypoint.sh"]
