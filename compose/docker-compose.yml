services:
  claude-runner:
    container_name: ${CLAUDE_CONTAINER_NAME:-claude-runner} # default name expected by agent-runner
    image: ${CLAUDE_IMAGE_NAME:-dogbot/claude-runner:local}
    build:
      context: ..
      dockerfile: docker/claude-runner/Dockerfile
      args:
        CLAUDE_CODE_VERSION: ${CLAUDE_CODE_VERSION:-2.1.104}
    restart: unless-stopped
    stdin_open: false
    tty: false
    cpus: "4.0"
    mem_limit: 4g
    memswap_limit: 4g
    pids_limit: 256
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777
      - /run:size=64m
    environment:
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-http://host.docker.internal:9000}
      ANTHROPIC_AUTH_TOKEN: ${API_PROXY_AUTH_TOKEN:-local-proxy-token}
      CLAUDE_CONFIG_DIR: /state/claude
      CLAUDE_CODE_ADDITIONAL_DIRECTORIES_CLAUDE_MD: 1
      CLAUDE_CODE_DISABLE_AUTO_MEMORY: 1
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      ALL_PROXY: ${ALL_PROXY:-}
      NO_PROXY: ${NO_PROXY:-}
      http_proxy: ${HTTP_PROXY:-}
      https_proxy: ${HTTPS_PROXY:-}
      all_proxy: ${ALL_PROXY:-}
      no_proxy: ${NO_PROXY:-}
    volumes:
      - "${AGENT_WORKSPACE_DIR:-/srv/agent-workdir}:/workspace"
      - "${AGENT_STATE_DIR:-/srv/agent-state}:/state"
    working_dir: /workspace
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["/usr/local/bin/entrypoint.sh"]
